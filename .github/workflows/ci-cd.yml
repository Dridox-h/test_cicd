name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── ETAPE 1 : Lint ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer ruff
        run: pip install ruff

      - name: Vérifier le style du code
        run: ruff check .

  # ─── ETAPE 2 : Tests ───────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint          # attend que lint soit OK
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest -v

  # ─── ETAPE 3 : Build & Push ────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test          # attend que les tests soient OK
    if: github.ref == 'refs/heads/main'   # uniquement sur main
    permissions:
      contents: read
      packages: write    # nécessaire pour pousser sur GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Se connecter à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer les tags Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Builder et pousser l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─── ETAPE 4 : Deploy ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Installer kubectl
        uses: azure/setup-kubectl@v3

      - name: Configurer l'accès au cluster
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Mettre à jour le tag de l'image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:sha-${{ github.sha }}"
          sed -i "s|ghcr.io/TON_GITHUB_USER/my-app:latest|${IMAGE}|" k8s/deployment.yaml

      - name: Déployer sur Kubernetes
        run: kubectl apply -f k8s/

      - name: Attendre la fin du déploiement
        run: kubectl rollout status deployment/my-app --timeout=120s
